name: Sync GitLab Vale Rules

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: sync-vale-rules
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest Vale rules
        run: |
          chmod +x download_vale_rules.sh
          ./download_vale_rules.sh

      - name: Check for changes
        id: check_changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync Vale rules from GitLab"
          branch: chore/sync-vale-rules
          delete-branch: true
          title: "chore: sync Vale rules from GitLab"
          body: |
            Automated sync of Vale rules from the GitLab repository.

            This PR was automatically created by the sync workflow.

            **Run date:** ${{ github.run_id }}
          labels: |
            automation
            dependencies

      - name: Report sync status
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          echo "✅ Pull request created for Vale rules sync"
